<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 1. 移动端核心适配：防止键盘遮挡输入框，禁止用户捏合缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coze Chat</title>
    <style>
        /* 2. 强制页面容器高度适配移动端视口 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #f7f7f7;
        }
    </style>
</head>
<body>

<!-- 引入 SDK -->
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>

<script>
    // 3. 异步初始化：确保 SDK DOM 加载优先级
    window.addEventListener('load', () => {
        const uniqueUserId = 'user_' + Math.random().toString(36).substr(2, 9);
        
        try {
            const cozeWebSDK = new CozeWebSDK.WebChatClient({
                config: {
                    bot_id: '7617022638862647305',
                },
                auth: {
                    type: 'token',
                    token: 'pat_H8S9m4UBXjX8liUls5Zn8JXcOyPMYEd9mM53HT4s7q6LObVmkeRveZwOc1ZERXpz',
                    onRefreshToken: async () => 'pat_H8S9m4UBXjX8liUls5Zn8JXcOyPMYEd9mM53HT4s7q6LObVmkeRveZwOc1ZERXpz'
                },
                userInfo: {
                    id: uniqueUserId,
                },
                ui: {
                    asstBtn: { isNeed: false }, // 隐藏悬浮球
                    chatBot: {
                        // 强制全屏显示，避免移动端窗口模式渲染失败
                        isMobile: true 
                    }
                }
            });

            // 4. 延迟触发：给 SDK API 初始化留出毫秒级的时间
            setTimeout(() => {
                cozeWebSDK.showChatBot();
            }, 100);
            
        } catch (err) {
            console.error("SDK Initialization Failed:", err);
        }
    });

    // 5. 阻止移动端页面橡皮筋效果（可选，提升原生感）
    document.body.addEventListener('touchmove', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>
