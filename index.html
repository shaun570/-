<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background: #f0f2f5;
        }
        /* 将容器宽度设为更大，例如 1000px，高度设为 90vh 避免占满垂直空间显得压抑 */
        #chat-container {
            width: 100%;
            max-width: 2300px; 
            height: 100vh;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="chat-container"></div>

<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>

<script>
    const cozeWebSDK = new CozeWebSDK.WebChatClient({
        config: {
            bot_id: '7617022638862647305',
            isIframe: false,
        },
        auth: {
    type: 'jwt',
    token: async () => {
        let userId = localStorage.getItem('coze_uid') || 'user_' + Math.random().toString(36).substr(2);
        localStorage.setItem('coze_uid', userId);
        // 使用相对路径请求后端
        const res = await fetch(`/api/get-token?uid=${userId}`);
        const data = await res.json();
        return data.token;
    }
},

        ui: {
            base: {
                layout: 'pc',
                zIndex: 1000,
            },
            // 修改点：明确禁用悬浮球，直接显示主体
            asstBtn: {
                isNeed: false,
            },
            chatBot: {
                el: document.getElementById('chat-container'),
                title: "智能在线助手",
                width: 2200, // 加宽到 2300px
                isNeedAddNewConversation: true,
                isNeedQuote: true,
                uploadable: true,
            },
        },
    });

    // 关键修正：确保 DOM 加载完成后，强制初始化并直接显示
    window.addEventListener('DOMContentLoaded', () => {
        // 部分 SDK 版本在挂载 el 后会自动渲染，如果没出来，手动调用 showChatBot
        cozeWebSDK.showChatBot();
    });
</script>
</body>
</html>
